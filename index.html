<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Studios AR Pass-Through</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        
        /* Hardware Selector Bar - Floats subtly over the top center */
        #hardware-dock {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); padding: 4px 12px; 
            border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.15);
        }
        #cameraSelect {
            background: transparent; color: rgba(255, 255, 255, 0.8); border: none; 
            font-size: 11px; outline: none; font-family: monospace; cursor: pointer;
        }
        #cameraSelect option { background: #000; color: #fff; }

        /* Twin-Lens AR Viewport Engine */
        #ar-matrix { display: flex; width: 100vw; height: 100vh; }
        .lens-channel { position: relative; width: 50%; height: 100%; overflow: hidden; }

        /* Pure AR Pass-Through Feed (Full Color, Full Scale) */
        .ar-stream-feed {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            object-fit: cover; transform: translate(-50%, -50%); z-index: 1;
            opacity: 1.0; /* Restored to full brightness for true real-world pass-through */
        }

        /* Subtle Alignment Reference Dot */
        .alignment-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: rgba(255, 255, 255, 0.25);
            border-radius: 50%; z-index: 5; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Camera Selection Input Node -->
    <div id="hardware-dock">
        <select id="cameraSelect"><option value="">CONNECTING OPTICS...</option></select>
    </div>

    <!-- Dual Eye Screen Division -->
    <div id="ar-matrix">
        
        <!-- LEFT EYE DISPLAY CHANNEL -->
        <div class="lens-channel">
            <video class="ar-stream-feed" autoplay playsinline muted></video>
            <div class="alignment-dot"></div>
        </div>
        
        <!-- RIGHT EYE DISPLAY CHANNEL -->
        <div class="lens-channel">
            <video class="ar-stream-feed" autoplay playsinline muted></video>
            <div class="alignment-dot"></div>
        </div>

    </div>

    <script>
        const cameraSelect = document.getElementById('cameraSelect');
        const streamFeeds = document.querySelectorAll('.ar-stream-feed');
        let operationalStream = null;

        // 1. Scan and Enumerate Available Lens Channels
        async function initializeOptics() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                const hardwareDevices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = hardwareDevices.filter(d => d.kind === 'videoinput');

                cameraSelect.innerHTML = '';
                if (videoDevices.length === 0) {
                    cameraSelect.innerHTML = '<option>NO VIDEO CAPTURE HARDWARE</option>';
                    return;
                }

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `OPTICAL CAMERA ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                // Auto-target the primary active or external index lens
                mountStream(videoDevices[0].deviceId);
            } catch (err) {
                console.error("Optics Lock Failure:", err);
                cameraSelect.innerHTML = '<option>HARDWARE PERMISSION REFUSED</option>';
            }
        }

        // 2. Stream Mapping Connection Loop
        async function mountStream(deviceId) {
            if (operationalStream) {
                operationalStream.getTracks().forEach(track => track.stop());
            }

            const parameters = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    width: { ideal: 1920 }, // Bumped resolution profiles up for cleaner sharpness
                    height: { ideal: 1080 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(parameters);
                operationalStream = stream;

                streamFeeds.forEach(feed => {
                    feed.srcObject = stream;
                    feed.onloadedmetadata = () => {
                        feed.play().catch(e => console.log("Stream delivery interrupted:", e));
                    };
                });
            } catch (err) {
                console.error("Failed linking optical streams:", err);
            }
        }

        cameraSelect.addEventListener('change', (e) => { if (e.target.value) mountStream(e.target.value); });
        document.addEventListener('DOMContentLoaded', initializeOptics);
    </script>
</body>
</html>
