<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR OS PROJECT</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #00ffcc;
    }
    .vr-container {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
    }
    .eye-view {
      position: relative;
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      border-right: 1px dashed rgba(0, 255, 204, 0.2);
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none; /* FIX: Prevents the camera from blocking clicks! */
    }
    .hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10; /* FIX: Forces buttons to sit way above everything else */
      box-sizing: border-box;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none; /* Allows clicks to pass through empty spaces */
    }
    .widget {
      background: rgba(0, 20, 20, 0.6);
      border: 1px solid #00ffcc;
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
      pointer-events: auto; /* FIX: Forces buttons inside this box to be clickable */
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.4);
      border-radius: 8px;
      padding: 15px 10px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }
    .app-icon:active {
      background: rgba(0, 255, 204, 0.5);
      transform: scale(0.95);
    }
    .status-text {
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 5px #00ffcc;
    }
  </style>
</head>
<body>

  <div class="vr-container">
    <!-- LEFT EYE -->
    <div class="eye-view">
      <video id="leftVideo" autoplay playsinline muted></video>
      <div class="hud-overlay">
        <div class="top-bar">
          <div class="widget status-text">SYS: ACTIVE</div>
          <div class="widget status-text" id="clockLeft">12:00 PM</div>
        </div>
        <div class="widget">
          <div style="font-size: 10px; margin-bottom: 8px; opacity: 0.7;">APPLICATIONS</div>
          <div class="app-grid">
            <div class="app-icon" onclick="launchApp('chess')">Chess</div>
            <div class="app-icon" onclick="launchApp('stats')">Stats</div>
            <div class="app-icon" onclick="launchApp('stream')">Media</div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT EYE -->
    <div class="eye-view">
      <video id="rightVideo" autoplay playsinline muted></video>
      <div class="hud-overlay">
        <div class="top-bar">
          <div class="widget status-text">SYS: ACTIVE</div>
          <div class="widget status-text" id="clockRight">12:00 PM</div>
        </div>
        <div class="widget">
          <div style="font-size: 10px; margin-bottom: 8px; opacity: 0.7;">APPLICATIONS</div>
          <div class="app-grid">
            <div class="app-icon" onclick="launchApp('chess')">Chess</div>
            <div class="app-icon" onclick="launchApp('stats')">Stats</div>
            <div class="app-icon" onclick="launchApp('stream')">Media</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Modernized Camera stream setup with immediate hardware spin-up fallback
    function startCamera() {
      const constraints = { 
        video: { 
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }, 
        audio: false 
      };

      navigator.mediaDevices.getUserMedia(constraints)
      .then(function(stream) {
        const leftVid = document.getElementById('leftVideo');
        const rightVid = document.getElementById('rightVideo');
        
        leftVid.srcObject = stream;
        rightVid.srcObject = stream;
        
        // Force the layout engine to render the live frames immediately
        leftVid.play().catch(e => console.log(e));
        rightVid.play().catch(e => console.log(e));
      })
      .catch(function(err) { 
        console.log("Camera failed: ", err); 
        alert("Camera blocked. Please check your browser privacy permissions!");
      });
    }

    // Run the camera immediately upon page generation
    window.addEventListener('DOMContentLoaded', startCamera);

    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      minutes = minutes < 10 ? '0' + minutes : minutes;
      const timeString = hours + ':' + minutes + ' ' + ampm;
      
      const cLeft = document.getElementById('clockLeft');
      const cRight = document.getElementById('clockRight');
      if(cLeft && !cLeft.innerText.startsWith("LOAD")) cLeft.innerText = timeString;
      if(cRight && !cRight.innerText.startsWith("LOAD")) cRight.innerText = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function launchApp(appName) {
      document.getElementById('clockLeft').innerText = "LOAD: " + appName.toUpperCase();
      document.getElementById('clockRight').innerText = "LOAD: " + appName.toUpperCase();
    }

    // PWA Service worker registrar
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("Service Worker Failed", err));
    }
  </script>
</body>
</html>
