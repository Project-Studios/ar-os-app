<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Studios VR OS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Camera Control UI Overlay */
        #os-ui-layer {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #cameraSelect {
            background: transparent;
            color: #fff;
            border: none;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        #cameraSelect option { background: #111; color: #fff; }

        /* VR Split Screen Architecture */
        #vr-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        .viewports {
            position: relative;
            width: 50%;
            height: 100%;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .viewports:last-child { border-right: none; }

        /* Background Video Feed Mapping */
        .bg-video-feed {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Interactive HUD Overlay Grid */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: #00ffcc;
            text-shadow: 0 0 5px #00ffcc;
        }
        .status-bar { display: flex; justify-content: space-between; font-size: 14px; letter-spacing: 1px; }
        .center-matrix { display: flex; justify-content: center; align-items: center; flex-grow: 1; }
        .reticle { width: 12px; height: 12px; border: 2px solid #00ffcc; border-radius: 50%; opacity: 0.7; }
        .widget-panel { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- OS Control Layer -->
    <div id="os-ui-layer">
        <select id="cameraSelect">
            <option value="">Initializing Video...</option>
        </select>
    </div>

    <!-- Dual Viewport VR Setup -->
    <div id="vr-container">
        <!-- Left Eye -->
        <div class="viewports" id="left-eye">
            <video class="bg-video-feed" autoplay playsinline muted></video>
            <div class="hud-overlay">
                <div class="status-bar"><span>SYS_OK</span><span>BAT: 100%</span></div>
                <div class="center-matrix"><div class="reticle"></div></div>
                <div class="widget-panel"><span>PROJECT_STUDIOS // VR_OS</span></div>
            </div>
        </div>
        
        <!-- Right Eye -->
        <div class="viewports" id="right-eye">
            <video class="bg-video-feed" autoplay playsinline muted></video>
            <div class="hud-overlay">
                <div class="status-bar"><span>SYS_OK</span><span>BAT: 100%</span></div>
                <div class="center-matrix"><div class="reticle"></div></div>
                <div class="widget-panel"><span>PROJECT_STUDIOS // VR_OS</span></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
