<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PROJECT VR OS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #00ffcc; /* Futuristic Cyan */
    }

    .vr-container {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
    }

    /* Screen Splits */
    .eye-view {
      position: relative;
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      border-right: 1px dashed rgba(0, 255, 204, 0.2);
    }

    /* Background Camera Stream */
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* UI Overlay Layer */
    .hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      box-sizing: border-box;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none; /* Allows interacting through the overlay if needed */
    }

    /* Glassmorphic UI Widgets */
    .widget {
      background: rgba(0, 20, 20, 0.4);
      border: 1px solid #00ffcc;
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
      pointer-events: auto; /* Makes widgets clickable */
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.4);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .app-icon:active {
      background: rgba(0, 255, 204, 0.4);
      transform: scale(0.95);
    }

    .status-text {
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 0 5px #00ffcc;
    }
  </style>
</head>
<body>

  <div class="vr-container">
    
    <!-- ================= LEFT EYE VIEW ================= -->
    <div class="eye-view">
      <video id="leftVideo" autoplay playsinline muted></video>
      <div class="hud-overlay">
        <div class="top-bar">
          <div class="widget status-text">SYS: ACTIVE</div>
          <div class="widget status-text" id="clockLeft">12:00 PM</div>
        </div>
        
        <!-- App Menu Launcher -->
        <div class="widget">
          <div style="font-size: 10px; margin-bottom: 8px; opacity: 0.7;">APPLICATIONS</div>
          <div class="app-grid">
            <div class="app-icon" onclick="launchApp('chess')">Chess</div>
            <div class="app-icon" onclick="launchApp('stats')">Stats</div>
            <div class="app-icon" onclick="launchApp('stream')">Media</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ================= RIGHT EYE VIEW ================= -->
    <div class="eye-view">
      <video id="rightVideo" autoplay playsinline muted></video>
      <div class="hud-overlay">
        <div class="top-bar">
          <div class="widget status-text">SYS: ACTIVE</div>
          <div class="widget status-text" id="clockRight">12:00 PM</div>
        </div>
        
        <!-- App Menu Launcher (Must match Left perfectly) -->
        <div class="widget">
          <div style="font-size: 10px; margin-bottom: 8px; opacity: 0.7;">APPLICATIONS</div>
          <div class="app-grid">
            <div class="app-icon" onclick="launchApp('chess')">Chess</div>
            <div class="app-icon" onclick="launchApp('stats')">Stats</div>
            <div class="app-icon" onclick="launchApp('stream')">Media</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 1. Activate the single hardware camera for both eyes
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    })
    .then(function(stream) {
      document.getElementById('leftVideo').srcObject = stream;
      document.getElementById('rightVideo').srcObject = stream;
    })
    .catch(function(err) {
      alert("Camera error: " + err);
    });

    // 2. Real-time Live OS Clock Function
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12; 
      minutes = minutes < 10 ? '0'+minutes : minutes;
      const timeString = hours + ':' + minutes + ' ' + ampm;
      
      document.getElementById('clockLeft').innerText = timeString;
      document.getElementById('clockRight').innerText = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 3. App Logic Placeholder
    // 3. App Logic - Now with visual feedback!
// 3. App Launch Trigger Box
    function launchApp(appName) {
      // Find the clock boxes and change them to show the launched app!
      document.getElementById('clockLeft').innerText = "LOAD: " + appName.toUpperCase();
      document.getElementById('clockRight').innerText = "LOAD: " + appName.toUpperCase();
    }
      // We will handle loading interfaces inside the widgets here!
    }
  // This tells the phone's browser that this is an installable app!
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Registered"))
        .catch(err => console.log("Service Worker Failed", err));
    }
  </script>
</body>
</html>
